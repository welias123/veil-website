<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="72" y1="56" x2="440" y2="456" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8b7bff"/>
      <stop offset="0.5" stop-color="#6c5cf0"/>
      <stop offset="1" stop-color="#3f36a6"/>
    </linearGradient>
    <linearGradient id="vstroke" x1="256" y1="150" x2="256" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e6e3ff"/>
    </linearGradient>
    <linearGradient id="drape" x1="256" y1="150" x2="256" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- App tile -->
  <rect x="32" y="32" width="448" height="448" rx="116" fill="url(#tile)"/>
  <!-- Top sheen -->
  <rect x="32" y="32" width="448" height="448" rx="116" fill="url(#drape)"/>
  <!-- Inner hairline -->
  <rect x="32.75" y="32.75" width="446.5" height="446.5" rx="115.25" stroke="#ffffff" stroke-opacity="0.14" stroke-width="1.5"/>

  <!-- Veil drape behind the V: a soft translucent fold for depth -->
  <path d="M150 158 L256 372 L362 158 L316 158 L256 288 L196 158 Z" fill="url(#drape)"/>

  <!-- The V mark: a clean, confident chevron -->
  <g filter="url(#soft)">
    <path d="M156 162 L256 366 L356 162" stroke="url(#vstroke)" stroke-width="42"
          stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Accent seam down the fold -->
  <path d="M256 300 L256 360" stroke="#ffffff" stroke-opacity="0.35" stroke-width="8" stroke-linecap="round"/>
</svg>
